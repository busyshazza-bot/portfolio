    if (typeof gsap === 'undefined') {

    function enterSite() {
        const intro = document.getElementById('track1');
        const bgMusic = document.getElementById('track2');
        const entrance = document.getElementById('entrance');
        const hero = document.getElementById('hero-container');

        if (intro) {
            intro.play().catch(e => console.warn("Audio blocked — browser requires interaction first:", e));
            intro.onended = () => {
                if (bgMusic) {
                    bgMusic.volume = 0.4;
                    bgMusic.play().catch(e => console.log("Background audio failed:", e));
                }
            };
        }

        // Animate entrance out
        if (entrance) {
            if (typeof gsap !== 'undefined') {
                gsap.to(entrance, { 
                    y: "-100%", 
                    duration: 1.5, 
                    ease: "expo.inOut",
                    onComplete: () => entrance.style.display = 'none'
                });
            } else {
                entrance.style.transition = 'transform 1.5s ease';
                entrance.style.transform = 'translateY(-100%)';
                setTimeout(() => entrance.style.display = 'none', 1500);
            }
        }

        // Show hero
        if (hero) {
            hero.style.display = 'flex';
            if (typeof gsap !== 'undefined') {
                gsap.to(hero, { 
                    autoAlpha: 1, 
                    duration: 1.2, 
                    delay: 0.5,
                    ease: "power2.out"
                });
            } else {
                setTimeout(() => {
                    hero.style.opacity = '1';
                    hero.style.visibility = 'visible';
                    hero.style.transition = 'opacity 1.2s ease, visibility 1.2s ease';
                }, 500);
            }
        }
    }

    function toggleMusic() {
        const track1 = document.getElementById('track1');
        const track2 = document.getElementById('track2');
        const statusDot = document.getElementById('status-dot');
        const musicText = document.getElementById('musicText');
        const targetVolume = 0.4;

        if (!track1.paused) {
            track1.pause();
            track1.currentTime = 0;
        }

        if (track2.paused) {
            track2.volume = 0; 
            track2.play().catch(e => console.log("Playback failed:", e));
            
            if (window.fadeEffect) clearInterval(window.fadeEffect);
            window.fadeEffect = setInterval(() => {
                if (track2.volume < targetVolume) {
                    track2.volume = Math.min(targetVolume, track2.volume + 0.01);
                } else {
                    clearInterval(window.fadeEffect);
                }
            }, 30);

            musicText.innerText = "Atmosphere On";
            statusDot.className = "w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse";
        } else {
            if (window.fadeEffect) clearInterval(window.fadeEffect);
            window.fadeEffect = setInterval(() => {
                if (track2.volume > 0.02) {
                    track2.volume -= 0.02;
                } else {
                    track2.pause();
                    clearInterval(window.fadeEffect);
                }
            }, 20);

            musicText.innerText = "Atmosphere Off";
            statusDot.className = "w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse";
        }
    }

                        <p class="text-[11px] text-zinc-500 mt-1 uppercase tracking-wider">Materialize physical or mental anchors into the timeline.</p>
                    </div>
                    <form id="matrix-injector" class="space-y-4" onsubmit="injectNewNode(event)">
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2 font-mono">Anchor Designation</label>
                            <input type="text" id="node-title" required placeholder="e.g., Deep State Neural Recharge" 
                                   class="w-full bg-black/60 border border-[#c5a059]/20 rounded-none px-4 py-3 text-xs focus:outline-none focus:border-[#c5a059] text-white tracking-wide">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2 font-mono">Energy Matrix Blueprint</label>
                            <select id="node-blueprint" class="w-full bg-black/60 border border-[#c5a059]/20 rounded-none px-4 py-3 text-xs focus:outline-none focus:border-[#c5a059] text-zinc-400">
                                <option value="vitality">Vitality (Physical Health / Ritual)</option>
                                <option value="cognition">Cognition (Focus / Output)</option>
                                <option value="essence">Essence (Spirit / Restoration)</option>
                                <option value="influence">Influence (Social / Leadership)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2 font-mono">Temporal Coordinates</label>
                            <input type="date" id="node-date" class="w-full bg-black/60 border border-[#c5a059]/20 rounded-none px-4 py-3 text-xs focus:outline-none focus:border-[#c5a059] text-white">
                        </div>
                        <button type="submit" class="w-full py-3 border border-[#c5a059]/40 bg-[#c5a059]/5 hover:bg-[#c5a059] hover:text-black transition-all duration-500 uppercase text-[10px] tracking-[4px]">
                            Inject Into Timeline
                        </button>
                    </form>
                </div>

                <div class="lg:col-span-2 glass-panel p-8 rounded-none min-h-[600px] relative overflow-hidden">
                    <h3 class="text-xs font-bold tracking-widest text-[#c5a059] uppercase mb-6" style="font-family: 'Orbitron', sans-serif;">Timeline Visualisation</h3>
                    <div id="timeline-container" class="relative h-[500px] border-l border-[#c5a059]/20 pl-8 space-y-8">
                        <div class="timeline-node relative" data-type="vitality">
                            <div class="absolute -left-10 top-0 w-4 h-4 rounded-full bg-[#c5a059] shadow-[0_0_10px_#c5a059]"></div>
                            <span class="text-[9px] text-zinc-500 font-mono">2026-06-15</span>
                            <h4 class="text-white font-bold uppercase mt-1">System Initialisation</h4>
                            <p class="text-zinc-400 text-xs mt-1">Core archive loaded. All sectors online.</p>
                        </div>
                    </div>
                    <div class="absolute bottom-4 right-4 text-[8px] text-zinc-600 font-mono">CHRONOS_v4.2.1 // STABLE</div>
                </div>
            </div>
        </div>
        `
    };

    function injectNewNode(e) {
        e.preventDefault();
        const title = document.getElementById('node-title').value;
        const type = document.getElementById('node-blueprint').value;
        const date = document.getElementById('node-date').value;

        const container = document.getElementById('timeline-container');
        const nodeEl = document.createElement('div');
        nodeEl.className = "timeline-node relative";
        nodeEl.dataset.type = type;
        nodeEl.innerHTML = `
            <div class="absolute -left-10 top-0 w-4 h-4 rounded-full bg-[#c5a059] shadow-[0_0_10px_#c5a059]"></div>
            <span class="text-[9px] text-zinc-500 font-mono">${date}</span>
            <h4 class="text-white font-bold uppercase mt-1">${title}</h4>
            <p class="text-zinc-400 text-xs mt-1">Energy type: ${type}</p>
        `;
        container.appendChild(nodeEl);
        e.target.reset();
    }

    // Quran Surah Data
    const surahList = [
        {num:1, name:"Al-Fatiha", videos:["surah1_vid1.mp4","surah1_vid2.mp4"]},
        {num:2, name:"Al-Baqarah", videos:["surah2_vid1.mp4"]},
        {num:3, name:"Ali 'Imran", videos:["surah3_vid1.mp4","surah3_vid2.mp4"]},
        {num:4, name:"An-Nisa", videos:["surah4_vid1.mp4"]},
        {num:5, name:"Al-Ma'idah", videos:["surah5_vid1.mp4","surah5_vid2.mp4"]},
        {num:6, name:"Al-An'am", videos:["surah6_vid1.mp4"]},
        {num:7, name:"Al-A'raf", videos:["surah7_vid1.mp4","surah7_vid2.mp4"]},
        {num:8, name:"Al-Anfal", videos:["surah8_vid1.mp4"]},
        {num:9, name:"At-Tawbah", videos:["surah9_vid1.mp4","surah9_vid2.mp4"]},
        {num:10, name:"Yunus", videos:["surah10_vid1.mp4"]}
    ];

    function openPage(pageName) {
        const display = document.getElementById('page-display');
        const content = document.getElementById('dynamic-content');
        content.innerHTML = content[pageName] || `<p class="text-center">Content not found</p>`;
        display.classList.add('active');

        if (pageName === 'quran') {
            const grid = document.getElementById('quran-grid');
            grid.innerHTML = '';
            surahList.forEach(s => {
                const hex = document.createElement('div');
                hex.className = "surah-hex";
                hex.onclick = () => openSurah(s);
                hex.innerHTML = `<div class="hex-num">${s.num}</div><div class="hex-title">${s.name}</div>`;
                grid.appendChild(hex);
            });
        }

        // Initialise portfolio slideshows
        if (pageName === 'portfolio') {
            document.querySelectorAll('.slideshow-container').forEach(container => {
                const imgs = container.querySelectorAll('.slideshow-img');
                let idx = 0;
                if (imgs.length > 1) {
                    setInterval(() => {
                        imgs[idx].classList.add('hidden');
                        idx = (idx + 1) % imgs.length;
                        imgs[idx].classList.remove('hidden');
                    }, 3000);
                }
            });
        }
    }

    function openSurah(surah) {
        document.getElementById('active-surah-name').textContent = `Surah ${surah.name}`;
        const grid = document.getElementById('surah-video-grid');
        grid.innerHTML = '';
        surah.videos.forEach(src => {
            const vidEl = document.createElement('div');
            vidEl.className = "glass-panel aspect-video";
            vidEl.innerHTML = `
                <video src="${src}" controls class="w-full h-full object-cover" preload="metadata">
                    Your browser does not support video.
                </video>
            `;
            grid.appendChild(vidEl);
        });
        const overlay = document.getElementById('surah-overlay');
        overlay.style.display = 'block';
        gsap.to(overlay, {opacity:1, duration:0.6});
    }

    function closeSurah() {
        const overlay = document.getElementById('surah-overlay');
        gsap.to(overlay, {opacity:0, duration:0.6, onComplete:()=> overlay.style.display='none'});
    }

    function closeAll() {
        document.getElementById('page-display').classList.remove('active');
    }

    function magnetic(e) {
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width/2;
        const y = e.clientY - rect.top - rect.height/2;
        gsap.to(el, {x: x*0.2, y: y*0.2, duration:0.3});
    }

    document.querySelectorAll('.dock-item').forEach(item => {
        item.addEventListener('mouseleave', ()=> gsap.to(item, {x:0,y:0,duration:0.5}));
    });

    // Background Particle Canvas
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', ()=>{
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
    });

    class Particle {
        constructor(){
            this.reset();
        }
        reset(){
            this.x = Math.random()*canvas.width;
            this.y = Math.random()*canvas.height;
            this.size = Math.random()*2+0.5;
            this.speedX = (Math.random()-0.5)*0.5;
            this.speedY = (Math.random()-0.5)*0.5;
            this.color = 'rgba(197, 160, 89, '+ (Math.random()*0.3+0.1) +')';
        }
        update(){
            this.x += this.speedX;
            this.y += this.speedY;
            if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset();
        }
        draw(){
            ctx.beginPath();
            ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function initParticles(){
        particles = [];
        for(let i=0;i<120;i++) particles.push(new Particle());
    }

    function animateParticles(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{p.update();p.draw();});
        requestAnimationFrame(animateParticles);
    }
    initParticles();
    animateParticles();

    </script>

</body>
</html>
