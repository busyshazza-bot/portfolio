<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circadian Protocol Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --color-gold: #c5a059;
            --color-dark: #09090b;
        }
        body {
            background-color: var(--color-dark);
            color: #f4f4f5;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
        }
        canvas #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .ui-layer {
            position: relative;
            z-index: 10;
        }
        .glass-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        /* Navigation View Overlay States */
        .page-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 9, 11, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none;
            opacity: 0;
            overflow-y: auto;
        }
        .page-layer.active {
            display: flex;
        }
        /* Specialized Hexagonal Grid Icons for Quran Hub */
        .surah-hex {
            position: relative;
            background: rgba(197, 160, 89, 0.03);
            border: 1px solid rgba(197, 160, 89, 0.15);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
        .surah-hex:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--color-gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(197, 160, 89, 0.3);
        }
        .hex-num {
            display: block;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-gold);
        }
        .hex-title {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: #a1a1aa;
        }
        /* Heatmap Grid Core Sizing */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.375rem;
            max-width: 240px;
        }
        .heatmap-cell {
            aspect-ratio: 1;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        /* Checkbox completion reactive typography strike out styling */
        li.completed span {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .routine-progress {
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            overflow: hidden;
            margin-top: 1rem;
        }
        .routine-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--color-gold);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

    };// --- 2. INTERACTIVE CANVAS PARTICLE BACKGROUND ENGINE ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: -100, y: -100 };

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('resize', () => { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
        initParticles();
    });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.baseX = this.x;
            this.baseY = this.y;
            this.size = Math.random() * 1.5 + 0.5;
            this.density = (Math.random() * 20) + 1;
        }
        update() {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let forceDirectionX = dx / distance;
            let forceDirectionY = dy / distance;
            let maxDistance = 150;
            let force = (maxDistance - distance) / maxDistance;
            
            if (distance < maxDistance) {
                this.x -= forceDirectionX * force * this.density;
                this.y -= forceDirectionY * force * this.density;
            } else {
                if (this.x !== this.baseX) {
                    let dx = this.x - this.baseX;
                    this.x -= dx / 15;
                }
                if (this.y !== this.baseY) {
                    let dy = this.y - this.baseY;
                    this.y -= dy / 15;
                }
            }
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 120; i++) particles.push(new Particle());
    }
    initParticles();

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- 7. ERGONOMIC MAGNETIC INTERACTION COMPONENT ---
    function magnetic(e) {
        const item = e.currentTarget;
        const rect = item.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        gsap.to(item, { x: x * 0.35, y: y * 0.35, duration: 0.3 });

    // --- 8. STATE ENGINE AND ARCHIVE STREAK MATRIX ---
    const PROTOCOL_KEY = 'circadian_protocol_v1';
    let archiveData = {
        history: {},
        today: { date: new Date().toISOString().split('T')[0], tasks: [] }
    };

    function loadState() {
        try {
            const local = localStorage.getItem(PROTOCOL_KEY);
            if (local) {
                const parsed = JSON.parse(local);
                if (parsed.history && parsed.today) archiveData = parsed;
            }
            
            const currentLocalDate = new Date().toISOString().split('T')[0];
            if (archiveData.today.date !== currentLocalDate) {
                archiveData.history[archiveData.today.date] = calculateCompletionPercentage();
                archiveData.today = { date: currentLocalDate, tasks: [] };
                saveData();
            }
            hydrateCheckboxesFromState();
        } catch (e) {
            console.error("Database mismatch verification crash averted:", e);
        }
    }

    function saveData() {
        try {
            localStorage.setItem(PROTOCOL_KEY, JSON.stringify(archiveData));
        } catch (e) {
            console.error("Persistent storage layer sync fault:", e);
        }
    }

    function hydrateCheckboxesFromState() {
        const defaultCheckboxes = document.querySelectorAll('.default-tasks input[type="checkbox"]');
        defaultCheckboxes.forEach((cb, idx) => {
            if (archiveData.today.tasks && archiveData.today.tasks[idx] !== undefined) {
                cb.checked = archiveData.today.tasks[idx];
                cb.closest('li')?.classList.toggle('completed', cb.checked);
            }
        });
    }

    function calculateCompletionPercentage() {
        const totalCheckboxes = document.querySelectorAll('.task-checkbox');
        if (totalCheckboxes.length === 0) return 0;
        const checkedBoxes = Array.from(totalCheckboxes).filter(cb => cb.checked).length;
        return Math.round((checkedBoxes / totalCheckboxes.length) * 100);
    }

    function calculateProgress() {
        const defaultCheckboxes = document.querySelectorAll('.default-tasks input[type="checkbox"]');
        archiveData.today.tasks = Array.from(defaultCheckboxes).map(cb => cb.checked);
        saveData();

        document.querySelectorAll('.routine-card').forEach(card => {
            const subCheckboxes = card.querySelectorAll('.task-checkbox');
            const fillBar = card.querySelector('.routine-progress-fill');
            
            if (subCheckboxes.length > 0 && fillBar) {
                const total = subCheckboxes.length;
                const completed = Array.from(subCheckboxes).filter(cb => cb.checked).length;
                const percent = Math.round((completed / total) * 100);
                
                card.dataset.progress = percent;
                fillBar.style.width = percent + '%';
                card.style.borderColor = (percent === 100) ? 'rgba(197, 160, 89, 0.4)' : '';
            }
        });

        const globalPercent = calculateCompletionPercentage();
        const scoreTextElement = document.getElementById('global-score-text');
        if (scoreTextElement) scoreTextElement.innerText = globalPercent + '% COMPLETED';
        
        updateHeatmap();
    }

    function updateHeatmap() {
        const matrixGrid = document.getElementById('heatmap-grid');
        if (!matrixGrid) return;

        matrixGrid.innerHTML = '';
        const itemsCount = 28; 
        const now = new Date();

        for (let i = itemsCount - 1; i >= 0; i--) {
            const d = new Date();
            d.setDate(now.getDate() - i);
            const dayString = d.toISOString().split('T')[0];
            
            let score = (dayString === archiveData.today.date) ? calculateCompletionPercentage() : (archiveData.history[dayString] || 0);

            const cell = document.createElement('div');
            cell.className = 'heatmap-cell';
            cell.title = `${dayString} : ${score}% Action`;
            
            if (score === 0) cell.style.backgroundColor = 'rgba(255,255,255,0.03)';
            else if (score < 40) cell.style.backgroundColor = 'rgba(197, 160, 89, 0.15)';
            else if (score < 75) cell.style.backgroundColor = 'rgba(197, 160, 89, 0.45)';
            else cell.style.backgroundColor = 'rgba(197, 160, 89, 0.85)';
            
            matrixGrid.appendChild(cell);
        }
    }

                renderTasks();
            };
